<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AquaPark Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#00c6ff,#0072ff);
        }

        .login-box{
            width:350px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            text-align:center;
        }

        .login-box h1{
            margin-bottom:25px;
            color:#0072ff;
        }

        input{
            width:100%;
            padding:14px;
            margin:10px 0;
            border:none;
            border-radius:10px;
            background:#f1f1f1;
            font-size:16px;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#0072ff;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#0057cc;
        }

    </style>

</head>
<body>

    <form class="login-box" method="POST">

        <h1>AquaPark Admin</h1>

        <input type="text" name="username" placeholder="Login" required>

        <input type="password" name="password" placeholder="Parol" required>

        <button type="submit">Kirish</button>

    </form>

</body>
</html>
