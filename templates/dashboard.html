<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AquaPark Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#0f172a;
            color:white;
            padding:20px;
        }

        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:30px;
        }

        .topbar h1{
            font-size:32px;
        }

        .logout{
            padding:12px 20px;
            background:red;
            color:white;
            text-decoration:none;
            border-radius:10px;
        }

        .section{
            margin-bottom:50px;
        }

        .section h2{
            margin-bottom:20px;
            font-size:28px;
            color:#38bdf8;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(80px,1fr));
            gap:15px;
        }

        .place{
            height:80px;
            border-radius:15px;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:20px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
            position:relative;
        }

        .place:hover{
            transform:scale(1.05);
        }

        .free{
            background:#22c55e;
        }

        .occupied{
            background:#eab308;
            color:black;
        }

        .expired{
            background:#ef4444;
        }

        .modal{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.7);
            display:none;
            justify-content:center;
            align-items:center;
        }

        .modal-box{
            background:white;
            color:black;
            padding:30px;
            border-radius:20px;
            width:350px;
        }

        .modal-box h2{
            margin-bottom:20px;
        }

        .modal-box select,
        .modal-box button{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:10px;
        }

        .modal-box button{
            background:#0072ff;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        .close{
            background:red !important;
        }

    </style>

</head>
<body>

    <div class="topbar">

        <h1>AquaPark Admin Panel</h1>

        <a href="/logout" class="logout">Logout</a>

    </div>

    <!-- ERKAKLAR -->

    <div class="section">

        <h2>Erkaklar</h2>

        <div class="grid">

            {% for place in male_places %}

                <div
                    class="place {{ place.status }}"
                    onclick="openModal('{{ place.number }}', 'male')"
                >
                    {{ place.number }}
                </div>

            {% endfor %}

        </div>

    </div>

    <!-- AYOLLAR -->

    <div class="section">

        <h2>Ayollar</h2>

        <div class="grid">

            {% for place in female_places %}

                <div
                    class="place {{ place.status }}"
                    onclick="openModal('{{ place.number }}', 'female')"
                >
                    {{ place.number }}
                </div>

            {% endfor %}

        </div>

    </div>

    <!-- MODAL -->

    <div class="modal" id="modal">

        <div class="modal-box">

            <h2>Joy Band Qilish</h2>

            <form method="POST" action="/occupy">

                <input type="hidden" name="place" id="placeInput">

                <input type="hidden" name="gender" id="genderInput">

                <select name="duration">

                    <option value="normal">1.5 Soat</option>

                    <option value="vip">VIP</option>

                </select>

                <button type="submit">Band Qilish</button>

            </form>

            <button class="close" onclick="closeModal()">
                Yopish
            </button>

        </div>

    </div>

    <script>

        const modal = document.getElementById("modal")

        function openModal(place, gender){

            document.getElementById("placeInput").value = place
            document.getElementById("genderInput").value = gender

            modal.style.display = "flex"
        }

        function closeModal(){
            modal.style.display = "none"
        }

        // LIVE STATUS UPDATE

        setInterval(() => {

            fetch("/status")
            .then(res => res.json())
            .then(data => {

                document.querySelectorAll(".place").forEach(place => {

                    const number = place.innerText.trim()

                    place.classList.remove(
                        "free",
                        "occupied",
                        "expired"
                    )

                    place.classList.add(data[number])

                })

            })

        }, 5000)

    </script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
